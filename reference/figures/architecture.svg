<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" width="940" height="600" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" role="img" aria-label="vrpr architecture">
  <style>
    .title { font-size: 22px; font-weight: 700; fill: #16323d; }
    .sub   { font-size: 13px; fill: #5b7079; }
    .lyr   { font-size: 14px; font-weight: 700; }
    .lyrsub{ font-size: 11.5px; }
    .chip  { font-size: 12.5px; fill: #1d3b45; }
    .chipw { font-size: 12.5px; fill: #ffffff; }
    .flow  { font-size: 11.5px; fill: #5b7079; font-weight: 600; }
  </style>

  <rect x="8" y="8" width="924" height="584" rx="16" fill="#f8fafa" stroke="#e2e8e6"/>

  <text x="30" y="42" class="title">vrpr — how it works</text>
  <text x="30" y="64" class="sub">a tidy R interface over PyVRP's C++ core — no Python runtime</text>

  <!-- "No Python" badge -->
  <rect x="742" y="26" width="168" height="40" rx="20" fill="#59cd90"/>
  <text x="826" y="51" text-anchor="middle" font-size="13" font-weight="700" fill="#0c2027">no Python runtime</text>

  <!-- ===== Layer 1: Tidy R API ===== -->
  <rect x="30" y="86" width="700" height="128" rx="12" fill="#eaf5f1" stroke="#59cd90" stroke-width="1.5"/>
  <text x="46" y="110" class="lyr" fill="#16323d">1 — Tidy R API <tspan class="lyrsub" fill="#5b7079">tidyverse · {cli} · tibbles in, tibbles out</tspan></text>
  <g>
    <rect x="46" y="122" width="104" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="98" y="139" text-anchor="middle" class="chip">vrp_model()</text>
    <rect x="158" y="122" width="104" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="210" y="139" text-anchor="middle" class="chip">add_depot()</text>
    <rect x="270" y="122" width="110" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="325" y="139" text-anchor="middle" class="chip">add_clients()</text>
    <rect x="388" y="122" width="142" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="459" y="139" text-anchor="middle" class="chip">add_vehicle_type()</text>
    <rect x="538" y="122" width="180" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="628" y="139" text-anchor="middle" class="chip">read_vrplib() / read_solomon()</text>

    <rect x="46" y="160" width="120" height="26" rx="6" fill="#dff0ea" stroke="#59cd90"/><text x="106" y="177" text-anchor="middle" class="chip" font-weight="700">vrp_solve()</text>
    <rect x="174" y="160" width="230" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="289" y="177" text-anchor="middle" class="chip">stop = max_runtime() / max_iterations()</text>
    <rect x="412" y="160" width="200" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="512" y="177" text-anchor="middle" class="chip">routes() · cost() · summary()</text>
    <rect x="620" y="160" width="98" height="26" rx="6" fill="#fff" stroke="#bcd6cd"/><text x="669" y="177" text-anchor="middle" class="chip">plot()</text>
  </g>

  <!-- ===== Layer 2: R orchestration ===== -->
  <rect x="30" y="240" width="700" height="92" rx="12" fill="#e4eef2" stroke="#3fa7d6" stroke-width="1.5"/>
  <text x="46" y="264" class="lyr" fill="#16323d">2 — R orchestration <tspan class="lyrsub" fill="#5b7079">a faithful port of PyVRP's IteratedLocalSearch.py</tspan></text>
  <g>
    <rect x="46" y="278" width="246" height="30" rx="6" fill="#fff" stroke="#a9cfe0"/><text x="169" y="298" text-anchor="middle" class="chip">Iterated Local Search · LAHC + restart</text>
    <rect x="300" y="278" width="150" height="30" rx="6" fill="#fff" stroke="#a9cfe0"/><text x="375" y="298" text-anchor="middle" class="chip">PenaltyManager</text>
    <rect x="458" y="278" width="150" height="30" rx="6" fill="#fff" stroke="#a9cfe0"/><text x="533" y="298" text-anchor="middle" class="chip">stopping criteria</text>
    <rect x="616" y="278" width="102" height="30" rx="6" fill="#fff" stroke="#a9cfe0"/><text x="667" y="298" text-anchor="middle" class="chip">ils_params()</text>
  </g>

  <!-- ===== Layer 3: cpp11 binding ===== -->
  <rect x="30" y="358" width="700" height="58" rx="12" fill="#fff6e0" stroke="#f7b801" stroke-width="1.5"/>
  <text x="46" y="382" class="lyr" fill="#16323d">3 — cpp11 binding layer</text>
  <text x="46" y="402" class="chip">external pointers hold the C++ objects · tibbles &amp; matrices cross the data boundary · validation (int64 ↔ R)</text>

  <!-- ===== Layer 4: vendored C++ core ===== -->
  <rect x="30" y="442" width="700" height="130" rx="12" fill="#16323d" stroke="#59cd90" stroke-width="1.5"/>
  <text x="46" y="466" class="lyr" fill="#ffffff">4 — Vendored PyVRP C++ core <tspan class="lyrsub" fill="#9fc6c0">MIT · pinned version · the hot compute</tspan></text>
  <g>
    <rect x="46" y="480" width="316" height="30" rx="6" fill="#21505f" stroke="#3a6b78"/><text x="204" y="500" text-anchor="middle" class="chipw">ProblemData · Client · Depot · VehicleType</text>
    <rect x="370" y="480" width="150" height="30" rx="6" fill="#21505f" stroke="#3a6b78"/><text x="445" y="500" text-anchor="middle" class="chipw">CostEvaluator</text>
    <rect x="528" y="480" width="190" height="30" rx="6" fill="#21505f" stroke="#3a6b78"/><text x="623" y="500" text-anchor="middle" class="chipw">RandomNumberGenerator</text>

    <rect x="46" y="520" width="220" height="30" rx="6" fill="#21505f" stroke="#3a6b78"/><text x="156" y="540" text-anchor="middle" class="chipw">Solution · Route · Trip</text>
    <rect x="274" y="520" width="444" height="30" rx="6" fill="#21505f" stroke="#3a6b78"/><text x="496" y="540" text-anchor="middle" class="chipw">LocalSearch + operators (Exchange, SwapTails, SwapStar, …)</text>
  </g>

  <!-- ===== flow arrows ===== -->
  <!-- downward "build & solve" flow between layers: line + slim DOWN triangle,
       tip stopping ~5px above the next box -->
  <g fill="#3fa7d6" stroke="none">
    <line x1="380" y1="216" x2="380" y2="226" stroke="#3fa7d6" stroke-width="2"/>
    <path d="M375,226 L385,226 L380,235 Z"/>
    <line x1="380" y1="334" x2="380" y2="344" stroke="#3fa7d6" stroke-width="2"/>
    <path d="M375,344 L385,344 L380,353 Z"/>
    <line x1="380" y1="418" x2="380" y2="428" stroke="#3fa7d6" stroke-width="2"/>
    <path d="M375,428 L385,428 L380,437 Z"/>
  </g>

  <!-- upward "results" flow on the right: line + slim UP triangle -->
  <line x1="826" y1="518" x2="826" y2="164" stroke="#59cd90" stroke-width="2.5"/>
  <path d="M821,164 L831,164 L826,154 Z" fill="#59cd90" stroke="none"/>
  <text x="826" y="540" text-anchor="middle" class="flow">solve</text>
  <g transform="translate(848,340) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" class="flow" fill="#3a7d6a">results → cost() · routes() · plot()</text>
  </g>
</svg>
