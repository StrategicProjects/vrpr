name: watch-pyvrp-upstream

# Watches PyVRP stable releases. When the latest release is newer than the
# vendored version (tools/PYVRP_VERSION), it opens/keeps a tracking issue.
# It never touches code -- it only notifies, for human review before re-vendoring.

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare the vendored version with the latest PyVRP release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pinned="$(tr -d '[:space:]' < tools/PYVRP_VERSION)"
          # /releases/latest ignores pre-releases (e.g. 0.14.0a0), which is what we want.
          latest="$(gh api repos/PyVRP/PyVRP/releases/latest --jq '.tag_name')"

          echo "Vendored: $pinned | Latest upstream stable: $latest"

          if [ "$pinned" = "$latest" ]; then
            echo "Up to date. Nothing to do."
            exit 0
          fi

          title="PyVRP update available: ${latest}"
          body=$(cat <<EOF
          PyVRP has published a new stable release.

          - Vendored in \`vrpr\`: **${pinned}**
          - Latest upstream stable: **${latest}**
          - Notes: https://github.com/PyVRP/PyVRP/releases/tag/${latest}

          ### Re-vendoring checklist
          - [ ] Review the changelog (data model / API / algorithm changes)
          - [ ] Run \`tools/vendor.R\` to bring \`src/vendor/pyvrp/\` to tag ${latest}
          - [ ] Reconcile the cpp11 bindings with any upstream \`bindings.cpp\` changes
          - [ ] Update \`tools/PYVRP_VERSION\` to ${latest}
          - [ ] Run the parity tests (fixed seed) and \`R CMD check\`

          _Opened automatically by \`.github/workflows/watch-upstream.yml\`._
          EOF
          )

          # Update the existing tracking issue (same title) or open a new one.
          existing="$(gh issue list --state open --search "in:title PyVRP update available" --json number,title \
            --jq ".[] | select(.title==\"${title}\") | .number" | head -n1)"

          if [ -n "${existing:-}" ]; then
            echo "Issue #${existing} already exists for ${latest}. Nothing to do."
          else
            gh issue create --title "$title" --body "$body" --label "upstream" || \
              gh issue create --title "$title" --body "$body"
          fi
